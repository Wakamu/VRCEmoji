name: Build & Release
permissions:
  contents: write
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - run: dotnet publish VRCEMoji/VRCEMoji.csproj -c Release -r win-x64 --no-self-contained -p:PublishSingleFile=true -o publish

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $short = "${{ github.sha }}".Substring(0, 7)
          gh release create "build-$short" publish/VRCEMoji.exe --title "${{ github.ref_name }}" --notes "Build from commit ${{ github.sha }}" --latest
